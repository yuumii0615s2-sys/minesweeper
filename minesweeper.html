<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>マインスイーパー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #39d353;
    --accent2: #58a6ff;
    --danger: #f85149;
    --warn: #e3b341;
    --text: #e6edf3;
    --muted: #7d8590;
    --cell-unrevealed: #21262d;
    --cell-hover: #2d333b;
    --cell-revealed: #0d1117;
    --cell-size: 44px;
    --gap: 3px;
    --radius: 8px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 0 32px;
  }

  /* ── ヘッダー ── */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  /* ── 難易度ボタン ── */
  .difficulty {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 400px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-height: 56px;
    justify-content: center;
  }

  .diff-btn span {
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
  }

  .diff-btn.active {
    background: #0f2d12;
    border-color: var(--accent);
    color: var(--accent);
  }

  .diff-btn.active span { color: #39d35399; }

  .diff-btn:active { transform: scale(0.95); }

  /* ── ステータスバー ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    gap: 10px;
  }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 72px;
    flex: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  #mine-stat .stat-value { color: var(--danger); }
  #timer-stat .stat-value { color: var(--accent2); }

  /* ── リセットボタン ── */
  #reset-btn {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #reset-btn:active { transform: scale(0.9); background: var(--surface); }

  /* ── メッセージ ── */
  #message {
    width: 100%;
    max-width: 400px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    min-height: 20px;
    color: var(--muted);
    padding: 0 16px;
    letter-spacing: 1px;
    transition: color 0.3s;
  }

  #message.win { color: var(--accent); }
  #message.lose { color: var(--danger); }

  /* ── ボード ── */
  main {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 16px 12px 0;
    overflow-x: auto;
  }

  #board {
    display: grid;
    gap: var(--gap);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    background: var(--surface);
    width: fit-content;
  }

  /* ── セル ── */
  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    background: var(--cell-unrevealed);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s;
    position: relative;
    overflow: hidden;
  }

  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    border-radius: inherit;
  }

  .cell:not(.revealed):not(.game-over-cell):hover,
  .cell:not(.revealed):not(.game-over-cell):active {
    background: var(--cell-hover);
  }

  .cell:not(.revealed):active { transform: scale(0.88); }

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: #21262d;
    cursor: default;
  }

  .cell.revealed::after { display: none; }

  .cell.flagged {
    background: #2d1f07;
    border-color: var(--warn);
  }

  .cell.mine-boom {
    background: #3d0f0f;
    border-color: var(--danger);
    animation: boom 0.3s ease;
  }

  .cell.mine-show {
    background: #1e1010;
    border-color: #f8514966;
  }

  @keyframes boom {
    0% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  @keyframes reveal-pop {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .cell.pop { animation: reveal-pop 0.18s ease forwards; }

  /* 数字の色 */
  .n1 { color: #58a6ff; }
  .n2 { color: #39d353; }
  .n3 { color: #f85149; }
  .n4 { color: #a371f7; }
  .n5 { color: #ff7b72; }
  .n6 { color: #56d364; }
  .n7 { color: #e3b341; }
  .n8 { color: #7d8590; }

  /* ── ヒント ── */
  .hint {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 16px;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hint-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }

  /* ── ロングプレス進捗リング ── */
  .cell .press-ring {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    border: 3px solid transparent;
    transition: border-color 0s;
    pointer-events: none;
    clip-path: inset(0 round 6px);
  }

  .cell.pressing .press-ring {
    border-color: var(--warn);
    animation: ring-fill 0.5s linear forwards;
  }

  @keyframes ring-fill {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }

  /* スキャンライン雰囲気演出 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<header>
  <div class="title">💣 MINESWEEPER</div>

  <div class="difficulty">
    <button class="diff-btn active" data-level="easy">
      初級<span>9×9 / 10個</span>
    </button>
    <button class="diff-btn" data-level="medium">
      中級<span>12×12 / 25個</span>
    </button>
    <button class="diff-btn" data-level="hard">
      上級<span>15×15 / 45個</span>
    </button>
  </div>

  <div class="status-bar">
    <div class="stat" id="mine-stat">
      <div class="stat-label">MINES</div>
      <div class="stat-value" id="mine-count">10</div>
    </div>
    <button id="reset-btn" title="リセット">🙂</button>
    <div class="stat" id="timer-stat">
      <div class="stat-label">TIME</div>
      <div class="stat-value" id="timer">0</div>
    </div>
  </div>

  <div id="message">タップして開始！</div>
</header>

<main>
  <div id="board"></div>
</main>

<div class="hint">
  <div class="hint-item">
    <span class="hint-badge">タップ</span>
    <span>マスを開く</span>
  </div>
  <div class="hint-item">
    <span class="hint-badge">長押し</span>
    <span>旗を立てる</span>
  </div>
</div>

<script>
const LEVELS = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 12, cols: 12, mines: 25 },
  hard:   { rows: 15, cols: 15, mines: 45 },
};

let cfg = LEVELS.easy;
let board, revealed, flagged;
let gameOver, started;
let timerInterval, timerSec;
let longPressTimer, longPressTarget;

// セルサイズを画面幅に合わせる
function calcCellSize() {
  const avail = Math.min(window.innerWidth - 40, 480);
  const size = Math.floor((avail - cfg.cols * 3 - 20) / cfg.cols);
  return Math.max(30, Math.min(48, size));
}

function init() {
  clearInterval(timerInterval);
  timerSec = 0;
  started = false;
  gameOver = false;

  board    = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(0));
  revealed = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(false));
  flagged  = Array.from({length: cfg.rows}, () => Array(cfg.cols).fill(false));

  document.getElementById('timer').textContent = '0';
  document.getElementById('mine-count').textContent = cfg.mines;
  document.getElementById('reset-btn').textContent = '🙂';
  const msg = document.getElementById('message');
  msg.textContent = 'タップして開始！';
  msg.className = '';

  renderBoard();
}

function placeMines(skipR, skipC) {
  let placed = 0;
  while (placed < cfg.mines) {
    const r = Math.floor(Math.random() * cfg.rows);
    const c = Math.floor(Math.random() * cfg.cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - skipR) <= 1 && Math.abs(c - skipC) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      if (board[r][c] === -1) continue;
      let n = 0;
      neighbors(r, c).forEach(([nr, nc]) => { if (board[nr][nc] === -1) n++; });
      board[r][c] = n;
    }
  }
}

function neighbors(r, c) {
  const res = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols) res.push([nr, nc]);
    }
  return res;
}

function floodReveal(r, c) {
  if (r < 0 || r >= cfg.rows || c < 0 || c >= cfg.cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0) neighbors(r, c).forEach(([nr, nc]) => floodReveal(nr, nc));
}

function startTimer() {
  timerInterval = setInterval(() => {
    timerSec = Math.min(timerSec + 1, 999);
    document.getElementById('timer').textContent = timerSec;
  }, 1000);
}

function countFlags() {
  let n = 0;
  flagged.forEach(row => row.forEach(f => { if (f) n++; }));
  return n;
}

function checkWin() {
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (board[r][c] !== -1 && !revealed[r][c]) return false;
  return true;
}

function handleOpen(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  if (!started) {
    started = true;
    placeMines(r, c);
    startTimer();
  }

  if (board[r][c] === -1) {
    // ゲームオーバー
    gameOver = true;
    clearInterval(timerInterval);
    revealed[r][c] = true;
    renderBoard(r, c);
    document.getElementById('reset-btn').textContent = '😵';
    const msg = document.getElementById('message');
    msg.textContent = `💥 GAME OVER — ${timerSec}秒`;
    msg.className = 'lose';
    return;
  }

  floodReveal(r, c);
  renderBoard();

  if (checkWin()) {
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('reset-btn').textContent = '😎';
    const msg = document.getElementById('message');
    msg.textContent = `🎉 CLEAR！ ${timerSec}秒でクリア！`;
    msg.className = 'win';
    // 旗を全地雷に
    for (let rr = 0; rr < cfg.rows; rr++)
      for (let cc = 0; cc < cfg.cols; cc++)
        if (board[rr][cc] === -1) flagged[rr][cc] = true;
    document.getElementById('mine-count').textContent = 0;
    renderBoard();
  }
}

function handleFlag(r, c) {
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  document.getElementById('mine-count').textContent = cfg.mines - countFlags();
  const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (cellEl) updateCell(cellEl, r, c);
}

// ── 描画 ──
function renderBoard(boomR, boomC) {
  const size = calcCellSize();
  document.documentElement.style.setProperty('--cell-size', size + 'px');

  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, ${size}px)`;

  boardEl.innerHTML = '';
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.innerHTML = '<div class="press-ring"></div>';
      updateCell(cell, r, c, boomR, boomC);
      attachEvents(cell, r, c);
      boardEl.appendChild(cell);
    }
  }
}

function updateCell(cell, r, c, boomR, boomC) {
  const isMine = board[r][c] === -1;
  const isRevealed = revealed[r][c];
  const isFlagged = flagged[r][c];

  // クラスリセット
  cell.classList.remove('revealed', 'flagged', 'mine-boom', 'mine-show', 'pop');
  for (let i = 1; i <= 8; i++) cell.classList.remove('n' + i);

  // テキスト（press-ringを除く）
  const ring = cell.querySelector('.press-ring');
  cell.textContent = '';
  cell.appendChild(ring);

  if (isRevealed) {
    cell.classList.add('revealed');
    if (isMine) {
      if (boomR === r && boomC === c) {
        cell.classList.add('mine-boom');
        cell.append('💣');
      } else {
        cell.classList.add('mine-show');
        cell.append('💣');
      }
    } else if (board[r][c] > 0) {
      cell.classList.add('n' + board[r][c]);
      cell.append(board[r][c]);
    }
  } else if (isFlagged) {
    cell.classList.add('flagged');
    cell.append('🚩');
  }
}

// ── イベント ──
function attachEvents(cell, r, c) {
  // PC: クリック / 右クリック
  cell.addEventListener('click', (e) => {
    e.preventDefault();
    handleOpen(r, c);
  });

  cell.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    handleFlag(r, c);
  });

  // スマホ: タッチ長押し
  cell.addEventListener('touchstart', (e) => {
    longPressTarget = cell;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      longPressTarget = null;
      cell.classList.remove('pressing');
      handleFlag(r, c);
    }, 500);
    cell.classList.add('pressing');
  }, { passive: true });

  cell.addEventListener('touchend', (e) => {
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      cell.classList.remove('pressing');
      // 長押しでなければ通常タップ
      handleOpen(r, c);
    }
  });

  cell.addEventListener('touchmove', (e) => {
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      cell.classList.remove('pressing');
    }
  }, { passive: true });

  cell.addEventListener('touchcancel', () => {
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      cell.classList.remove('pressing');
    }
  });
}

// ── 難易度切替 ──
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cfg = LEVELS[btn.dataset.level];
    init();
  });
});

document.getElementById('reset-btn').addEventListener('click', init);

// 画面回転・リサイズ対応
window.addEventListener('resize', () => {
  const size = calcCellSize();
  document.documentElement.style.setProperty('--cell-size', size + 'px');
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, ${size}px)`;
});

init();
</script>
</body>
</html>
